<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History - N.B.K.R.IST</title>
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="form.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <span class="logo-icon">⚕</span>
                <h2>N.B.K.R.IST</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="index.html" class="nav-item">
                    <span>Home</span>
                </a>
                <a href="dashboard.html" class="nav-item">
                    <span>Dashboard</span>
                </a>
                <div class="nav-section">
                    <span class="nav-label">Diseases</span>
                    <a href="liver.html" class="nav-item">
                        <span>Liver Disease Prediction</span>
                    </a>
                    <a href="kidney.html" class="nav-item">
                        <span>Kidney Disease Prediction</span>
                    </a>
                    <a href="lung.html" class="nav-item">
                        <span>Lung Cancer Prediction</span>
                    </a>
                    <a href="parkinsons.html" class="nav-item">
                        <span>Parkinson's Prediction</span>
                    </a>
                </div>
                <a href="history.html" class="nav-item active">
                    <span>History</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <p>© 2024 N.B.K.R.IST</p>
            </div>
        </aside>

        <main class="main-content">
            <header class="page-header">
                <div class="header-left">
                    <h1>Prediction History</h1>
                </div>
                <div class="header-right">
                    <span class="user-info">Guest User</span>
                </div>
            </header>

            <div class="content">
                <div class="history-section">
                    <table class="history-table">
                        <thead>
                            <tr>
                                <th>Disease</th>
                                <th>Result</th>
                                <th>Risk Percentage</th>
                                <th>Date & Time</th>
                            </tr>
                        </thead>
                        <tbody id="historyTable">
                            <tr>
                                <td colspan="4" style="text-align: center; color: var(--gray);">No prediction history yet.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
